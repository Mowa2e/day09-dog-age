<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狗狗歲數計算機 - 快捷APP</title>
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="apple-touch-icon" href="./icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./icon.png">
    <style>
        :root {
            --primary-color: #f39c12;
            --dark-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1543466835-00a7907e9de1?auto=format&fit=crop&q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 450px;
            color: var(--dark-color);
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input[type="date"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #ccc;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: not-allowed;
            transition: all 0.3s;
        }

        button.active {
            background-color: var(--primary-color);
            cursor: pointer;
        }

        #resultArea {
            margin-top: 1.5rem;
            padding: 1rem;
            border-top: 2px dashed #eee;
            display: none;
        }

        .highlight {
            color: var(--primary-color);
            font-size: 1.4rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>狗狗歲數計算機</h1>
        
        <div class="input-group">
            <label for="birthDate">選擇狗狗的出生日期：</label>
            <input type="date" id="birthDate">
        </div>

        <button id="calcBtn" disabled>開始計算</button>

        <div id="resultArea">
            <p>
                現在大約 <span id="dogAgeDisplay" class="highlight">0.0</span> 歲狗年齡。<br>
                換算人類年齡大約 <span id="humanAgeDisplay" class="highlight">0.0</span> 歲。
            </p>
        </div>
    </div>

    <script>
        const birthDateInput = document.getElementById('birthDate');
        const calcBtn = document.getElementById('calcBtn');
        const resultArea = document.getElementById('resultArea');
        const dogAgeDisplay = document.getElementById('dogAgeDisplay');
        const humanAgeDisplay = document.getElementById('humanAgeDisplay');

        // 設定日期上限為今天
        birthDateInput.max = new Date().toISOString().split('T')[0];

        // --- 核心邏輯：網頁載入時檢查 localStorage ---
        window.addEventListener('DOMContentLoaded', () => {
            const savedDate = localStorage.getItem('dogBirthDate');
            const savedDogAge = localStorage.getItem('dogAgeResult');
            const savedHumanAge = localStorage.getItem('humanAgeResult');

            if (savedDate) {
                birthDateInput.value = savedDate;
                // 啟用按鈕
                calcBtn.disabled = false;
                calcBtn.classList.add('active');
                
                // 如果有先前的計算結果，直接顯示
                if (savedDogAge && savedHumanAge) {
                    displayResults(savedDogAge, savedHumanAge);
                }
            }
        });

        // 監聽輸入框變動
        birthDateInput.addEventListener('change', () => {
            if (birthDateInput.value) {
                calcBtn.disabled = false;
                calcBtn.classList.add('active');
            } else {
                calcBtn.disabled = true;
                calcBtn.classList.remove('active');
            }
        });

        // 點擊計算按鈕
        calcBtn.addEventListener('click', () => {
            const birthDateValue = birthDateInput.value;
            const birthDate = new Date(birthDateValue);
            const now = new Date();
            
            const diffTime = Math.abs(now - birthDate);
            const dogAge = (diffTime / (1000 * 60 * 60 * 24) / 365.25).toFixed(1);

            let humanAge = 0;
            if (dogAge <= 0) {
                humanAge = 0;
            } else if (dogAge < 1) {
                humanAge = (dogAge * 31).toFixed(1);
            } else {
                humanAge = (16 * Math.log(dogAge) + 31).toFixed(1);
            }

            // 顯示結果
            displayResults(dogAge, humanAge);

            // --- 核心邏輯：存入 localStorage ---
            localStorage.setItem('dogBirthDate', birthDateValue);
            localStorage.setItem('dogAgeResult', dogAge);
            localStorage.setItem('humanAgeResult', humanAge);
        });

        // 顯示結果的函式
        function displayResults(dogAge, humanAge) {
            dogAgeDisplay.textContent = dogAge;
            humanAgeDisplay.textContent = humanAge;
            resultArea.style.display = 'block';
        }
    </script>
</body>
</html>
