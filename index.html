<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狗狗歲數計算機 - 記憶優化版</title>

    <!-- favicon / iOS icon -->
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="apple-touch-icon" href="./icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./icon.png">

    <style>
        :root {
            --primary-color: #f39c12;
            --dark-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1543466835-00a7907e9de1?auto=format&fit=crop&q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 450px;
            color: var(--dark-color);
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            font-weight: bold;
        }

        input[type="date"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        #calcBtn {
            background-color: #ccc;
            color: white;
            cursor: not-allowed;
        }

        #calcBtn.active {
            background-color: var(--primary-color);
            cursor: pointer;
        }

        #clearBtn {
            background-color: #e74c3c;
            color: white;
        }

        #resultArea {
            margin-top: 1.5rem;
            padding: 1rem;
            border-top: 2px dashed #eee;
            display: none;
        }

        .highlight {
            color: var(--primary-color);
            font-size: 1.4rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🐶 狗狗歲數計算機</h1>

    <div class="input-group">
        <label for="birthDate">選擇狗狗出生日期：</label>
        <input type="date" id="birthDate">
    </div>

    <button id="calcBtn">開始計算</button>
    <button id="clearBtn">清除紀錄</button>

    <div id="resultArea">
        <p>
            狗狗年齡：約 <span id="dogAgeDisplay" class="highlight">0.0</span> 歲<br>
            人類年齡：約 <span id="humanAgeDisplay" class="highlight">0.0</span> 歲
        </p>
    </div>
</div>

<script>
const birthDateInput = document.getElementById('birthDate');
const calcBtn = document.getElementById('calcBtn');
const clearBtn = document.getElementById('clearBtn');
const resultArea = document.getElementById('resultArea');
const dogAgeDisplay = document.getElementById('dogAgeDisplay');
const humanAgeDisplay = document.getElementById('humanAgeDisplay');

// 限制最大日期為今天
const today = new Date().toISOString().split('T')[0];
birthDateInput.max = today;

// 初始化
window.addEventListener('DOMContentLoaded', () => {
    const savedDate = localStorage.getItem('dogBirthDate');

    if (savedDate) {
        birthDateInput.value = savedDate;
        activateButton();
        calculateAge(savedDate); // 重新計算
    } else {
        deactivateButton();
    }
});

// 監聽輸入
birthDateInput.addEventListener('change', () => {
    if (birthDateInput.value) {
        activateButton();
    } else {
        deactivateButton();
    }
});

// 計算按鈕
calcBtn.addEventListener('click', () => {
    calculateAge(birthDateInput.value);
});

// 清除紀錄
clearBtn.addEventListener('click', () => {
    localStorage.clear();
    location.reload();
});

// 啟用按鈕
function activateButton() {
    calcBtn.classList.add('active');
    calcBtn.disabled = false;
}

// 停用按鈕
function deactivateButton() {
    calcBtn.classList.remove('active');
    calcBtn.disabled = true;
}

// 計算邏輯
function calculateAge(birthDateValue) {
    const birthDate = new Date(birthDateValue);
    const now = new Date();

    // 防呆：未來日期
    if (birthDate > now) {
        alert('出生日期不能是未來！');
        return;
    }

    const diffTime = Math.abs(now - birthDate);

    const dogAge = parseFloat(
        (diffTime / (1000 * 60 * 60 * 24) / 365.25).toFixed(1)
    );

    let humanAge = 0;

    if (dogAge <= 0) {
        humanAge = 0;
    } else if (dogAge < 1) {
        humanAge = parseFloat((dogAge * 31).toFixed(1));
    } else {
        humanAge = parseFloat((16 * Math.log(dogAge) + 31).toFixed(1));
    }

    displayResults(dogAge, humanAge);

    // 儲存
    localStorage.setItem('dogBirthDate', birthDateValue);
}

// 顯示結果
function displayResults(dogAge, humanAge) {
    dogAgeDisplay.textContent = dogAge;
    humanAgeDisplay.textContent = humanAge;
    resultArea.style.display = 'block';
}
</script>

</body>
</html>
